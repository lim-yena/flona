<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플로나</title>
    <script type="text/javascript" src="//wcs.naver.net/wcslog.js"></script>
    <script type="text/javascript">
        if(!wcs_add) var wcs_add = {};
            wcs_add["wa"] = "122e45a20709000";
            if(window.wcs) {
            wcs_do();
        }
    </script>
</head>
<body>
    <!-- 전화걸기 / 외부연동 -->

    <a href="tel:01071281041"  onclick="trackAndCall(event, '01071281041')">전화걸기</a>
    <script type="text/javascript">
        function trackAndCall(event, phoneNumber) {                   
            event.preventDefault();                  
            if (window.wcs) {
                wcs.inflow("https://4thdraw.github.io/4thdraw/"); 
                var _conv = {};
                _conv.type = "custom001"; 
                wcs.trans(_conv); 
            }                  
            setTimeout(() => {
                window.location.href = `tel:${phoneNumber}`;
            }, 500); 
        }
    </script>

    

    <a href="https://map.naver.com/p/entry/place/31222521?c=15.00,0,0,0,dh&placePath=/review" 
        target="_blank" rel="noopener" onclick="trackNaverReservation(event)">
        네이버예약                        
    </a>

    <script type="text/javascript">
        function trackNaverReservation(event) {

        event.preventDefault();
        if (window.wcs) {
        wcs.inflow("https://4thdraw.github.io/4thdraw/"); 
        var _conv = {};
        _conv.type = "purchase"; // 전환 유형 설정
        wcs.trans(_conv); // 전환 데이터 전송
        }
        window.open("https://map.naver.com/p/entry/place/31222521?c=15.00,0,0,0,dh&placePath=/review", "_blank");
        }
    </script>

</body>
</html>
